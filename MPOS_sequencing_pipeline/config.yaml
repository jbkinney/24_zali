# Configuration file for sequencing data processing workflow
# This configuration processes both NGS-NZ-3454 and NGS-NZ-3477 runs

# List of sequencing runs to process
sequencing_runs:
  - name: "NGS-NZ-3454"
    fastq_r1: "NGS-NZ-3454_S1_R1_001.fastq"
    fastq_r2: "NGS-NZ-3454_S1_R2_001.fastq"
    barcode_config: "barcode_config_3454.json"
  
  - name: "NGS-NZ-3477"
    fastq_r1: "NGS-NZ-3477_S1_R1_001.fastq"
    fastq_r2: "NGS-NZ-3477_S1_R2_001.fastq"
    barcode_config: "barcode_config_3477.json"

